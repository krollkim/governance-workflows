name: Complete Agent Governance

on:
  workflow_call:
    inputs:
      agents_config_path:
        description: 'Path to agents.yaml config in calling repo'
        default: 'agents.yaml'
        type: string
      pr_template_path:
        description: 'Path to PR template in calling repo'
        default: '.github/pull_request_template.md'
        type: string
      enable_ai_execution:
        description: 'Enable AI agent execution (requires execute-agents label)'
        default: false
        type: boolean
      ai_execution_mode:
        description: 'AI execution mode: simulate, execute, or interactive'
        default: 'simulate'
        type: string

jobs:
  # Run agent routing to determine specialists and post PR comment
  agent-routing:
    uses: ./.github/workflows/agent-routing.yml
    with:
      agents_config_path: ${{ inputs.agents_config_path }}
    secrets: inherit

  # Run governance validation (template compliance, limits, etc.)
  governance-validation:
    uses: ./.github/workflows/agent-governance.yml
    with:
      agents_config_path: ${{ inputs.agents_config_path }}
      pr_template_path: ${{ inputs.pr_template_path }}
    secrets: inherit

  # Run specialist domain enforcement
  specialist-enforcement:
    uses: ./.github/workflows/specialist-enforcement.yml
    with:
      agents_config_path: ${{ inputs.agents_config_path }}
    secrets: inherit

  # Optional: Execute AI agents if enabled and execute-agents label is present
  ai-agent-execution:
    if: >
      inputs.enable_ai_execution && 
      contains(github.event.pull_request.labels.*.name, 'execute-agents')
    needs: [agent-routing, governance-validation, specialist-enforcement]
    uses: ./.github/workflows/ai-agent-execution.yml
    with:
      agents_config_path: ${{ inputs.agents_config_path }}
      user_request: ${{ github.event.pull_request.title }}
      execution_mode: ${{ inputs.ai_execution_mode }}
    secrets: inherit